<!doctype html>
<html lang="ru" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=no"
        />
        <meta name="color-scheme" content="dark light" />
        <meta name="theme-color" content="#0a0f1a" id="metaThemeColor" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/assets/apple-touch-icon-180x180.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/assets/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="/assets/favicon-16x16.png"
        />
        <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
        <title>✨ Квазар</title>
        <meta name="description" content="Настройка подключения Квазар" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
        <script>
            // Apply theme before first paint to prevent flash
            (function() {
                var saved = localStorage.getItem("theme");
                var theme = saved || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
                document.documentElement.setAttribute("data-theme", theme);
            })();
        </script>
        <style>
            :root {
                --radius: 16px;
                --radius-lg: 24px;
                --radius-sm: 12px;
                --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            }

            /* Dark theme (default) */
            [data-theme="dark"] {
                --primary: #22d3ee;
                --primary-hover: #67e8f9;
                --primary-light: rgba(34, 211, 238, 0.15);
                --primary-lighter: rgba(34, 211, 238, 0.08);
                --primary-border: rgba(34, 211, 238, 0.3);
                --primary-gradient: linear-gradient(135deg, #0891b2, #0ea5e9);
                --surface: rgba(10, 15, 30, 0.85);
                --surface-solid: #0d1220;
                --bg: #060a14;
                --bg-gradient: radial-gradient(ellipse at 20% 0%, rgba(6, 182, 212, 0.08) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 100%, rgba(14, 165, 233, 0.06) 0%, transparent 60%),
                              #060a14;
                --text: #e2e8f0;
                --text-secondary: #94a3b8;
                --text-muted: #64748b;
                --border: rgba(255, 255, 255, 0.08);
                --border-light: rgba(255, 255, 255, 0.04);
                --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
                --shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.4);
                --shadow-lg: 0 20px 60px -20px rgba(0, 0, 0, 0.6);
                --shadow-btn: 0 8px 24px -18px rgba(0, 0, 0, 0.5);
                --glow: 0 0 40px rgba(34, 211, 238, 0.1);
                --modal-bg: rgba(6, 10, 20, 0.85);
                --toast-bg: rgba(8, 145, 178, 0.9);
                --toast-shadow: rgba(6, 182, 212, 0.3);
                --chip-active-bg: linear-gradient(135deg, #0891b2, #0ea5e9);
                --icon-wrap-border: rgba(34, 211, 238, 0.25);
                --icon-wrap-bg: rgba(34, 211, 238, 0.1);
                --extra-btn-border: rgba(56, 189, 248, 0.2);
                --extra-btn-bg: rgba(56, 189, 248, 0.08);
                --extra-btn-color: #7dd3fc;
                --step-number-shadow: rgba(6, 182, 212, 0.3);
                --step-line-from: rgba(34, 211, 238, 0.3);
                --step-line-to: rgba(34, 211, 238, 0.05);
                --btn-primary-shadow: rgba(6, 182, 212, 0.3);
                --btn-primary-shadow-hover: rgba(6, 182, 212, 0.45);
                --qr-fab-border: rgba(34, 211, 238, 0.3);
                --qr-fab-bg: rgba(10, 15, 30, 0.9);
                --qr-fab-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 20px rgba(6,182,212,0.15);
                --qr-fab-shadow-hover: 0 6px 24px rgba(0,0,0,0.4), 0 0 30px rgba(6,182,212,0.25);
                --modal-box-shadow: 0 0 40px rgba(6, 182, 212, 0.1);
                --heading-gradient: linear-gradient(135deg, #e0f2fe 0%, #67e8f9 40%, #38bdf8 100%);
                --danger-bg: rgba(239, 68, 68, 0.1);
                --danger-border: rgba(239, 68, 68, 0.25);
                --danger-color: #f87171;
                --danger-hover-bg: rgba(239, 68, 68, 0.18);
            }

            /* Light theme */
            [data-theme="light"] {
                --primary: #0891b2;
                --primary-hover: #0e7490;
                --primary-light: rgba(8, 145, 178, 0.1);
                --primary-lighter: rgba(8, 145, 178, 0.05);
                --primary-border: rgba(8, 145, 178, 0.25);
                --primary-gradient: linear-gradient(135deg, #0891b2, #0284c7);
                --surface: rgba(255, 255, 255, 0.85);
                --surface-solid: #ffffff;
                --bg: #f0f4f8;
                --bg-gradient: radial-gradient(ellipse at 20% 0%, rgba(8, 145, 178, 0.06) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 100%, rgba(14, 165, 233, 0.04) 0%, transparent 60%),
                              #f0f4f8;
                --text: #1e293b;
                --text-secondary: #475569;
                --text-muted: #94a3b8;
                --border: rgba(0, 0, 0, 0.08);
                --border-light: rgba(0, 0, 0, 0.04);
                --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
                --shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.08);
                --shadow-lg: 0 20px 60px -20px rgba(0, 0, 0, 0.12);
                --shadow-btn: 0 8px 24px -18px rgba(0, 0, 0, 0.1);
                --glow: 0 0 40px rgba(8, 145, 178, 0.06);
                --modal-bg: rgba(241, 245, 249, 0.9);
                --toast-bg: rgba(8, 145, 178, 0.9);
                --toast-shadow: rgba(8, 145, 178, 0.2);
                --chip-active-bg: linear-gradient(135deg, #0891b2, #0284c7);
                --icon-wrap-border: rgba(8, 145, 178, 0.2);
                --icon-wrap-bg: rgba(8, 145, 178, 0.08);
                --extra-btn-border: rgba(8, 145, 178, 0.15);
                --extra-btn-bg: rgba(8, 145, 178, 0.06);
                --extra-btn-color: #0e7490;
                --step-number-shadow: rgba(8, 145, 178, 0.2);
                --step-line-from: rgba(8, 145, 178, 0.2);
                --step-line-to: rgba(8, 145, 178, 0.05);
                --btn-primary-shadow: rgba(8, 145, 178, 0.2);
                --btn-primary-shadow-hover: rgba(8, 145, 178, 0.35);
                --qr-fab-border: rgba(8, 145, 178, 0.25);
                --qr-fab-bg: rgba(255, 255, 255, 0.95);
                --qr-fab-shadow: 0 4px 16px rgba(0,0,0,0.08), 0 0 20px rgba(8,145,178,0.08);
                --qr-fab-shadow-hover: 0 6px 24px rgba(0,0,0,0.12), 0 0 30px rgba(8,145,178,0.15);
                --modal-box-shadow: 0 0 40px rgba(8, 145, 178, 0.06);
                --heading-gradient: linear-gradient(135deg, #0c4a6e 0%, #0891b2 40%, #0ea5e9 100%);
                --danger-bg: rgba(239, 68, 68, 0.08);
                --danger-border: rgba(220, 38, 38, 0.2);
                --danger-color: #dc2626;
                --danger-hover-bg: rgba(239, 68, 68, 0.15);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            /* ---- Body ---- */
            body {
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                background: var(--bg-gradient);
                color: var(--text);
                min-height: 100dvh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 16px;
                -webkit-font-smoothing: antialiased;
                overflow: hidden;
                position: relative;
                transition: background 0.3s ease, color 0.3s ease;
            }

            /* ---- Card ---- */
            .card {
                width: 100%;
                max-width: 420px;
                background: var(--surface);
                backdrop-filter: blur(24px) saturate(1.4);
                -webkit-backdrop-filter: blur(24px) saturate(1.4);
                border-radius: var(--radius-lg);
                border: 1px solid var(--border);
                box-shadow: var(--shadow-lg);
                transition: background 0.3s ease, border-color 0.3s ease;
                padding: 24px;
                position: relative;
                overflow: visible;
                animation: cardIn 0.4s ease;
                z-index: 1;
            }

            @keyframes cardIn {
                from {
                    opacity: 0;
                    transform: translateY(16px) scale(0.98);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }

            /* ---- QR FAB ---- */
            .qr-fab {
                position: absolute;
                bottom: -20px;
                right: -20px;
                width: 52px;
                height: 52px;
                border-radius: 50%;
                border: 1px solid var(--qr-fab-border);
                background: var(--qr-fab-bg);
                backdrop-filter: blur(12px);
                color: var(--primary);
                cursor: pointer;
                transition: var(--transition);
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: var(--qr-fab-shadow);
                z-index: 50;
            }
            .qr-fab:hover {
                transform: scale(1.08);
                box-shadow: var(--qr-fab-shadow-hover);
            }
            .qr-fab:active {
                transform: scale(0.95);
            }
            .qr-fab svg {
                width: 24px;
                height: 24px;
            }

            /* ---- Header ---- */
            .view-header {
                text-align: center;
                margin-bottom: 24px;
            }
            .view-header h1 {
                font-size: 22px;
                font-weight: 700;
                margin-bottom: 4px;
                background: var(--heading-gradient);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            .view-header p {
                color: var(--text-secondary);
                font-size: 14px;
                line-height: 1.5;
            }

            /* ---- Device Grid ---- */
            .device-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                margin-bottom: 12px;
            }

            .device-btn {
                width: 100%;
                border-radius: var(--radius);
                border: 1px solid var(--border-light);
                background: var(--border-light);
                transition: var(--transition);
                padding: 18px 12px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 10px;
                box-shadow: none;
                cursor: pointer;
                font-size: 13px;
                font-weight: 500;
                color: var(--text);
                font-family: inherit;
            }
            .device-btn:hover {
                border-color: var(--primary-border);
                background: var(--primary-lighter);
                box-shadow: var(--glow);
                transform: translateY(-2px);
            }
            .device-btn:active {
                transform: translateY(0) scale(0.97);
            }

            .device-btn .icon-wrap {
                width: 44px;
                height: 44px;
                display: grid;
                place-items: center;
                border-radius: var(--radius-sm);
                border: 1px solid var(--icon-wrap-border);
                background: var(--icon-wrap-bg);
            }
            .device-btn .icon-wrap svg {
                width: 22px;
                height: 22px;
                color: var(--primary);
            }

            .device-btn-wide {
                grid-column: 1 / -1;
                flex-direction: row;
                gap: 14px;
                padding: 16px 20px;
                font-size: 14px;
            }
            .device-btn-wide .icon-wrap svg {
                width: 24px;
                height: 24px;
            }

            /* ---- Separator ---- */
            .separator {
                margin: 20px 0;
                border: none;
                border-top: 1px solid var(--border-light);
            }

            /* ---- Extra Device Button ---- */
            .extra-device-btn {
                width: 100%;
                border-radius: var(--radius);
                border: 1px solid var(--extra-btn-border);
                background: var(--extra-btn-bg);
                transition: var(--transition);
                padding: 14px 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 12px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
                color: var(--extra-btn-color);
                font-family: inherit;
            }
            .extra-device-btn:hover {
                background: var(--primary-light);
            }
            .extra-device-btn svg {
                width: 20px;
                height: 20px;
                flex-shrink: 0;
            }

            /* ---- App Selector ---- */
            .app-selector {
                display: flex;
                gap: 8px;
                margin-bottom: 20px;
                overflow-x: auto;
                scrollbar-width: none;
                -webkit-overflow-scrolling: touch;
            }
            .app-selector::-webkit-scrollbar {
                display: none;
            }

            .app-chip {
                padding: 8px 16px;
                border-radius: 100px;
                border: 1px solid var(--border);
                background: var(--border-light);
                outline: none;
                overflow: hidden;
                -webkit-appearance: none;
                appearance: none;
                font-size: 13px;
                font-weight: 500;
                font-family: inherit;
                color: var(--text-secondary);
                cursor: pointer;
                transition: var(--transition);
                white-space: nowrap;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .app-chip:hover {
                border-color: var(--primary-border);
                color: var(--text);
            }
            .app-chip.active {
                background: var(--chip-active-bg);
                border-color: transparent;
                color: white;
            }
            .app-chip .rec-star {
                font-size: 10px;
                line-height: 1;
                color: #fbbf24;
                text-shadow: 0 0 6px rgba(251, 191, 36, 0.5);
            }
            .app-chip.active .rec-star {
                color: white;
                text-shadow: none;
            }

            /* ---- Steps ---- */
            .steps {
                display: flex;
                flex-direction: column;
                gap: 0;
            }

            .step {
                display: flex;
                gap: 14px;
                padding: 0 0 20px;
                position: relative;
            }
            .step:last-child {
                padding-bottom: 0;
            }

            .step-indicator {
                display: flex;
                flex-direction: column;
                align-items: center;
                flex-shrink: 0;
            }

            .step-number {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: var(--primary-gradient);
                color: white;
                font-size: 13px;
                font-weight: 700;
                display: grid;
                place-items: center;
                flex-shrink: 0;
                box-shadow: 0 0 12px var(--step-number-shadow);
            }

            .step-line {
                width: 2px;
                flex: 1;
                background: linear-gradient(
                    to bottom,
                    var(--step-line-from),
                    var(--step-line-to)
                );
                margin-top: 8px;
                border-radius: 1px;
            }
            .step:last-child .step-line {
                display: none;
            }

            .step-content {
                flex: 1;
                padding-top: 4px;
                min-width: 0;
            }
            .step-title {
                font-size: 14px;
                font-weight: 600;
                margin-bottom: 4px;
            }
            .step-desc {
                font-size: 13px;
                color: var(--text-secondary);
                line-height: 1.5;
                margin-bottom: 10px;
            }
            .step-desc:last-child {
                margin-bottom: 0;
            }

            /* ---- Buttons ---- */
            .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 10px 18px;
                border-radius: var(--radius-sm);
                border: none;
                font-size: 13px;
                font-weight: 600;
                font-family: inherit;
                cursor: pointer;
                transition: var(--transition);
                text-decoration: none;
                white-space: nowrap;
            }
            .btn svg {
                width: 16px;
                height: 16px;
                flex-shrink: 0;
            }

            .btn-primary {
                background: var(--primary-gradient);
                color: white;
                box-shadow: 0 2px 12px var(--btn-primary-shadow);
            }
            .btn-primary:hover {
                box-shadow: 0 4px 20px var(--btn-primary-shadow-hover);
                filter: brightness(1.1);
            }
            .btn-primary:active {
                transform: scale(0.97);
            }

            .btn-outline {
                background: var(--border-light);
                color: var(--text);
                border: 1px solid var(--border);
            }
            .btn-outline:hover {
                border-color: var(--primary-border);
                background: var(--primary-light);
                color: var(--primary);
            }

            .btn-group {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            .btn-block {
                width: 100%;
            }

            /* ---- Modal ---- */
            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                height: 100dvh;
                background: var(--modal-bg);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                z-index: 1000;
                align-items: center;
                justify-content: center;
                padding: 20px;
                overflow: auto;
                animation: fadeIn 0.2s ease;
            }
            .modal-overlay.active {
                display: flex;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            .modal-box {
                background: var(--surface);
                backdrop-filter: blur(24px);
                border-radius: var(--radius-lg);
                max-width: 360px;
                width: 100%;
                box-shadow:
                    var(--shadow-lg),
                    var(--modal-box-shadow);
                border: 1px solid var(--border);
                animation: modalIn 0.3s ease;
                overflow: hidden;
            }

            @keyframes modalIn {
                from {
                    opacity: 0;
                    transform: scale(0.95) translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }

            .modal-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 20px 20px 0;
            }
            .modal-title {
                font-size: 17px;
                font-weight: 600;
            }
            .modal-close {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                border: none;
                background: var(--border-light);
                color: var(--text-secondary);
                cursor: pointer;
                display: grid;
                place-items: center;
                transition: var(--transition);
                font-size: 18px;
            }
            .modal-close:hover {
                background: var(--border);
            }
            .modal-body {
                padding: 20px;
            }

            .qr-wrap {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .qr-wrap canvas,
            .qr-wrap img {
                border-radius: var(--radius-sm);
                background: white;
                padding: 8px;
            }
            .qr-hint {
                margin-top: 12px;
                font-size: 13px;
                color: var(--text-muted);
                text-align: center;
            }

            /* ---- Toast ---- */
            .toast {
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%) translateY(80px);
                background: var(--toast-bg);
                backdrop-filter: blur(8px);
                color: white;
                padding: 10px 20px;
                border-radius: 100px;
                font-size: 13px;
                font-weight: 500;
                z-index: 2000;
                transition: transform 0.3s ease;
                pointer-events: none;
                box-shadow: 0 4px 16px var(--toast-shadow);
            }
            .toast.show {
                transform: translateX(-50%) translateY(0);
            }

            /* ---- View Transitions ---- */
            .view {
                animation: viewIn 0.3s ease;
            }
            @keyframes viewIn {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }

            /* ---- Info Collapsible ---- */
            .info-collapse {
                margin-bottom: 20px;
                border-radius: var(--radius-sm);
                border: 1px solid var(--border-light);
                background: var(--border-light);
                overflow: hidden;
            }
            .info-collapse-toggle {
                width: 100%;
                padding: 12px 14px;
                display: flex;
                align-items: center;
                gap: 8px;
                background: none;
                border: none;
                color: var(--text-muted);
                font-size: 13px;
                font-weight: 500;
                font-family: inherit;
                cursor: pointer;
                transition: var(--transition);
            }
            .info-collapse-toggle:hover {
                color: var(--text-secondary);
            }
            .info-collapse-toggle svg {
                width: 16px;
                height: 16px;
                flex-shrink: 0;
            }
            .info-collapse-chevron {
                margin-left: auto;
                transition: transform 0.2s ease;
            }
            .info-collapse.open .info-collapse-chevron {
                transform: rotate(180deg);
            }
            .info-collapse-body {
                display: none;
                padding: 0 14px 14px;
            }
            .info-collapse.open .info-collapse-body {
                display: block;
            }
            .info-collapse-body p {
                font-size: 13px;
                line-height: 1.6;
                color: var(--text-secondary);
                margin-bottom: 6px;
            }
            .info-collapse-body p:last-child {
                margin-bottom: 0;
            }

            /* ---- Direct Download Link ---- */
            .direct-download {
                font-size: 12px;
                color: var(--text-muted);
                margin-top: 8px;
            }
            .direct-download a {
                color: var(--primary);
                text-decoration: none;
                transition: var(--transition);
            }
            .direct-download a:hover {
                color: var(--primary-hover);
                text-decoration: underline;
            }

            /* ---- Expired Badge ---- */
            .status-badge {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 6px 12px;
                border-radius: 100px;
                font-size: 12px;
                font-weight: 600;
                margin-bottom: 16px;
            }
            .status-active {
                background: rgba(34, 197, 94, 0.15);
                color: #4ade80;
            }
            .status-expired {
                background: rgba(239, 68, 68, 0.15);
                color: #f87171;
            }

            /* ---- Support Button ---- */
            .support-btn {
                width: 100%;
                border-radius: var(--radius);
                border: 1px solid var(--danger-border);
                background: var(--danger-bg);
                transition: var(--transition);
                padding: 14px 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
                color: var(--danger-color);
                font-family: inherit;
                margin-top: 10px;
                text-decoration: none;
                animation: fadeSlideIn 0.4s ease;
            }
            .support-btn:hover {
                background: var(--danger-hover-bg);
            }

                from { opacity: 0; transform: translateY(8px); }

            /* ---- Theme Toggle ---- */
            .theme-toggle {
                position: fixed;
                top: 16px;
                right: 16px;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                border: 1px solid var(--border);
                background: var(--surface);
                backdrop-filter: blur(12px);
                color: var(--text-secondary);
                cursor: pointer;
                display: grid;
                place-items: center;
                z-index: 100;
                transition: var(--transition);
            }
            .theme-toggle:hover {
                color: var(--primary);
                border-color: var(--primary-border);
            }
            .theme-toggle svg {
                width: 20px;
                height: 20px;
            }
            .theme-toggle .icon-sun,
            .theme-toggle .icon-moon {
                position: absolute;
                transition: opacity 0.2s ease, transform 0.2s ease;
            }
            [data-theme="dark"] .theme-toggle .icon-sun { opacity: 1; transform: scale(1); }
            [data-theme="dark"] .theme-toggle .icon-moon { opacity: 0; transform: scale(0.6); }
            [data-theme="light"] .theme-toggle .icon-sun { opacity: 0; transform: scale(0.6); }
            [data-theme="light"] .theme-toggle .icon-moon { opacity: 1; transform: scale(1); }

            @media (max-width: 460px) {

                        panelData = JSON.parse(atob(b64));
                    }
                } catch (e) {}

                // Try data-panel attribute (like Dino page)

                        if (el?.dataset.panel) {

                        }
                    } catch (e) {}
                }

                if (panelData?.response?.subscriptionUrl) {
                    subscriptionUrl = panelData.response.subscriptionUrl;
                }
            }

            // ============================================================

            function detectDevice() {
                const ua = navigator.userAgent;
                const platform = navigator.platform;
                if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream)
                    return "ios";
                if (/Android/.test(ua)) {
                    // Check if it might be Android TV
                    if (/TV|BRAVIA|AFT|Chromecast/.test(ua)) return "tv";
                    return "android";
                }
                if (/Mac/.test(platform)) return "macos";
                if (/Win/.test(platform)) return "windows";
                if (/Linux/.test(platform)) return "linux";
                return null;
            }

                html += '<div class="view-header"><h1>Выберите устройство</h1>';
                html +=
                    "<p>Выберите устройство для настройки подключения</p></div>";

                html += '<div class="device-grid">';
                mainDevices.forEach((key) => {
                    const p = PLATFORMS[key];
                    html += `<button class="device-btn" onclick="selectPlatform('${key}')">
            <div class="icon-wrap">${ICONS[p.icon]}</div>
            <span>${p.name}</span>
        </button>`;
                });
                html += "</div>";

                // Linux + TV as wide buttons
                html += `<div style="display:flex;flex-direction:column;gap:12px;margin-top:12px;">`;
                ["linux", "tv"].forEach((key) => {
                    const p = PLATFORMS[key];
                    html += `<button class="device-btn device-btn-wide" onclick="selectPlatform('${key}')">
            <div class="icon-wrap">${ICONS[p.icon]}</div>
            <span>${p.name}</span>
        </button>`;
                });
                html += "</div>";

                html += "</div>";
                return html;
            }

            function renderInstructions() {
                const platform = PLATFORMS[currentPlatform];
                const app = platform.apps[currentAppIndex];
                let html = '<div class="view">';

                // Header
                html += `<div class="view-header" style="margin-bottom:16px;">`;
                html += `<h1>Настройка ${platform.name}</h1></div>`;

                // App selector (if >1 app)
                if (platform.apps.length > 1) {
                    html += '<div class="app-selector">';
                    platform.apps.forEach((a, i) => {
                        const active = i === currentAppIndex ? " active" : "";
                        const dot = a.recommended
                            ? '<span class="rec-star">★</span>'
                            : "";
                        html += `<span class="app-chip${active}" onclick="switchApp(${i})" role="button" tabindex="0">${dot}${esc(a.name)}</span>`;
                    });
                    html += "</div>";
                }

                // App info collapsible
                if (platform.showAppInfo) {
                    html += `<div class="info-collapse" id="appInfoCollapse">
            <button class="info-collapse-toggle" onclick="toggleInfoCollapse()">
                ${ICONS.info}
                <span>В чём разница приложений?</span>
                <span class="info-collapse-chevron">${ICONS.chevron}</span>
            </button>
            <div class="info-collapse-body">
                <p>Оба приложения — это VPN-клиенты. Они подключают вас к серверу с помощью ключа, который вы добавите на следующем шаге.</p>
                <p>Разницы почти нет — как Chrome и Firefox оба открывают сайты, так и эти приложения одинаково подключают VPN.</p>
                <p>Приложение со звёздочкой — наша рекомендация.</p>
            </div>
        </div>`;
                }

                // Steps
                html += '<div class="steps">';
                app.steps.forEach((step, i) => {
                    html += `<div class="step">`;
                    html += `<div class="step-indicator"><div class="step-number">${i + 1}</div><div class="step-line"></div></div>`;
                    html += `<div class="step-content">`;
                    html += `<div class="step-title">${esc(step.title)}</div>`;
                    html += `<div class="step-desc">${esc(step.desc)}</div>`;

                    if (step.action) {
                        html += '<div class="btn-group">';
                        if (step.action === "download") {
                            if (app.downloadLinks && app.downloadLinks.length > 0) {
                                app.downloadLinks.forEach(dl => {
                                    html += `<a href="${esc(dl.url)}" target="_blank" rel="noopener" class="btn btn-primary">${ICONS.download} ${esc(dl.label)}</a>`;
                                });
                            } else if (app.downloadUrl) {
                                html += `<a href="${esc(app.downloadUrl)}" target="_blank" rel="noopener" class="btn btn-primary">${ICONS.download} Скачать</a>`;
                            }
                        }
                        if (step.action === "import" && app.importUrl) {
                            if (subscriptionUrl) {
                                const importLink = app.importUrl.replace(
                                    "{{SUB_URL}}",
                                    subscriptionUrl,
                                );
                                html += `<a href="${esc(importLink)}" class="btn btn-primary" onclick="onImportClick()">${ICONS.import} Подключить</a>`;
                            }
                            html += `<button class="btn btn-outline" onclick="copySubUrl()">${ICONS.copy} Скопировать ссылку</button>`;
                        }
                        if (step.action === "copy") {
                            html += `<button class="btn btn-primary" onclick="copySubUrl()">${ICONS.copy} Скопировать ссылку</button>`;
                        }
                        html += "</div>";

                        // Direct APK download link
                        if (step.action === "download" && app.directApkUrl) {
                            html += `<div class="direct-download">Нет доступа к магазину приложений? <a href="${esc(app.directApkUrl)}" target="_blank" rel="noopener">Скачать напрямую</a></div>`;
                        }
                    }

                    html += "</div></div>";
                });
                html += "</div>";

                // Extra device button
                html += '<hr class="separator">';
                html += `<button class="extra-device-btn" onclick="goToDevices()">
        ${ICONS.devices} Подключить другое устройство
    </button>`;

                // Support button (appears after import click + 5s delay)
                if (showSupportBtn) {
                    html += `<a href="https://t.me/quazar_support" target="_blank" rel="noopener" class="support-btn" onclick="onSupportClick(event)">
        ${ICONS.warning} Не работает VPN
    </a>`;
                }

                html += "</div>";
                return html;
            }

            // ============================================================
            // ACTIONS
            // ============================================================
            function selectPlatform(key) {
                currentPlatform = key;
                currentAppIndex = 0;
                currentView = "instructions";
                showSupportBtn = false;
                if (supportTimeout) clearTimeout(supportTimeout);
                render();
            }

            function switchApp(index) {
                currentAppIndex = index;
                showSupportBtn = false;
                if (supportTimeout) clearTimeout(supportTimeout);
                render();
            }

            function goToDevices() {
                currentView = "devices";
                showSupportBtn = false;
                if (supportTimeout) clearTimeout(supportTimeout);
                render();
            }

            function toggleInfoCollapse() {
                document
                    .getElementById("appInfoCollapse")
                    ?.classList.toggle("open");
            }

            function onImportClick() {
                if (supportTimeout) clearTimeout(supportTimeout);
                supportTimeout = setTimeout(() => {
                    showSupportBtn = true;
                    render();
                }, 5000);
            }

            function onSupportClick(e) {
                e.preventDefault();
                showToast("Напишите нам в поддержку, мы обязательно поможем");
                setTimeout(() => {
                    window.open("https://t.me/quazar_support", "_blank");
                }, 1500);
            }

            function copySubUrl() {
                if (!subscriptionUrl) {
                    showToast("Ссылка подписки недоступна");
                    return;
                }
                navigator.clipboard
                    .writeText(subscriptionUrl)
                    .then(() => showToast("Ссылка скопирована!"))
                    .catch(() => showToast("Не удалось скопировать"));
            }

            function showQrModal() {
                const url = window.location.href;
                const modal = document.getElementById("qrModal");
                const container = document.getElementById("qrCode");
                container.innerHTML = "";
                try {
                    const qr = qrcode(0, "M");
                    qr.addData(url);
                    qr.make();
                    container.innerHTML = qr.createImgTag(5, 10);
                    container.querySelector("img").style.borderRadius = "12px";
                } catch (e) {
                    container.textContent = "Ошибка генерации QR";
                }
                modal.classList.add("active");
            }

            function closeModal() {
                document.getElementById("qrModal").classList.remove("active");
            }

            function showToast(msg) {
                const t = document.getElementById("toast");
                t.textContent = msg;
                t.classList.add("show");
                clearTimeout(t._timeout);
                t._timeout = setTimeout(() => t.classList.remove("show"), 2500);
            }

            function esc(str) {
                if (typeof str !== "string") return "";
                const d = document.createElement("div");
                d.textContent = str;
                return d.innerHTML;
            }

            // ============================================================
            // INIT
            // ============================================================
            document
                .getElementById("qrFab")
                .addEventListener("click", showQrModal);
            document
                .getElementById("qrModal")
                .addEventListener("click", function (e) {
                    if (e.target === this) closeModal();
                });

            loadPanelData();

            const detected = detectDevice();
            if (detected && PLATFORMS[detected]) {
                currentPlatform = detected;
                currentView = "instructions";
            } else {
                currentView = "devices";
            }

            render();

            // ============================================================
            // THEME
            // ============================================================
            (function () {
                function getSystemTheme() {
                    return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
                }

                function applyTheme(theme) {
                    document.documentElement.setAttribute("data-theme", theme);
                    const metaColor = document.getElementById("metaThemeColor");
                    if (metaColor) {
                        metaColor.content = theme === "dark" ? "#060a14" : "#f0f4f8";
                    }
                }

                // Init: use saved preference or system default
                const saved = localStorage.getItem("theme");
                applyTheme(saved || getSystemTheme());

                // Listen for system theme changes (only if no manual override)
                window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", () => {
                    if (!localStorage.getItem("theme")) {
                        applyTheme(getSystemTheme());
                    }
                });

                // Toggle button
                document.getElementById("themeToggle").addEventListener("click", () => {
                    const current = document.documentElement.getAttribute("data-theme");
                    const next = current === "dark" ? "light" : "dark";
                    localStorage.setItem("theme", next);
                    applyTheme(next);
                });
            })();
        </script>
    </body>
</html>
