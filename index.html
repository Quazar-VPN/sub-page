<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=no"
        />
        <meta name="color-scheme" content="dark only" />
        <meta name="theme-color" content="#0a0a1a" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/assets/apple-touch-icon-180x180.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/assets/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="/assets/favicon-16x16.png"
        />
        <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
        <title>✨ Квазар</title>
        <meta name="description" content="Настройка подключения Квазар" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
        <style>
            :root {
                --primary: #a78bfa;
                --primary-hover: #c4b5fd;
                --primary-light: rgba(167, 139, 250, 0.15);
                --primary-lighter: rgba(167, 139, 250, 0.08);
                --primary-border: rgba(167, 139, 250, 0.3);
                --surface: rgba(15, 15, 35, 0.85);
                --surface-solid: #111128;
                --bg: #0a0a1a;
                --text: #e8e4f0;
                --text-secondary: #9b95ab;
                --text-muted: #6b6580;
                --border: rgba(255, 255, 255, 0.08);
                --border-light: rgba(255, 255, 255, 0.04);
                --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
                --shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.4);
                --shadow-lg: 0 20px 60px -20px rgba(0, 0, 0, 0.6);
                --shadow-btn: 0 8px 24px -18px rgba(0, 0, 0, 0.5);
                --glow: 0 0 40px rgba(139, 92, 246, 0.15);
                --radius: 16px;
                --radius-lg: 24px;
                --radius-sm: 12px;
                --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            /* ---- Animated Cosmic Background ---- */
            body {
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                background: var(--bg);
                color: var(--text);
                min-height: 100dvh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 16px;
                -webkit-font-smoothing: antialiased;
                overflow: hidden;
                position: relative;
            }

            /* Stars canvas */
            #stars-canvas {
                position: fixed;
                inset: 0;
                z-index: 0;
                pointer-events: none;
            }

            /* Nebula glow layers */
            .nebula {
                position: fixed;
                border-radius: 50%;
                filter: blur(80px);
                opacity: 0.3;
                pointer-events: none;
                z-index: 0;
            }
            .nebula-1 {
                width: 500px;
                height: 500px;
                background: radial-gradient(
                    circle,
                    rgba(139, 92, 246, 0.4) 0%,
                    transparent 70%
                );
                top: -10%;
                left: -10%;
                animation: nebulaDrift1 20s ease-in-out infinite;
            }
            .nebula-2 {
                width: 400px;
                height: 400px;
                background: radial-gradient(
                    circle,
                    rgba(59, 130, 246, 0.3) 0%,
                    transparent 70%
                );
                bottom: -10%;
                right: -10%;
                animation: nebulaDrift2 25s ease-in-out infinite;
            }
            .nebula-3 {
                width: 300px;
                height: 300px;
                background: radial-gradient(
                    circle,
                    rgba(236, 72, 153, 0.2) 0%,
                    transparent 70%
                );
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                animation: nebulaDrift3 18s ease-in-out infinite;
            }

            @keyframes nebulaDrift1 {
                0%,
                100% {
                    transform: translate(0, 0);
                }
                33% {
                    transform: translate(60px, 40px);
                }
                66% {
                    transform: translate(-30px, 60px);
                }
            }
            @keyframes nebulaDrift2 {
                0%,
                100% {
                    transform: translate(0, 0);
                }
                33% {
                    transform: translate(-50px, -30px);
                }
                66% {
                    transform: translate(40px, -50px);
                }
            }
            @keyframes nebulaDrift3 {
                0%,
                100% {
                    transform: translate(-50%, -50%) scale(1);
                }
                50% {
                    transform: translate(-50%, -50%) scale(1.3);
                }
            }

            /* ---- Card ---- */
            .card {
                width: 100%;
                max-width: 420px;
                background: var(--surface);
                backdrop-filter: blur(24px) saturate(1.4);
                -webkit-backdrop-filter: blur(24px) saturate(1.4);
                border-radius: var(--radius-lg);
                border: 1px solid rgba(255, 255, 255, 0.08);
                box-shadow: var(--shadow-lg), var(--glow);
                padding: 24px;
                position: relative;
                overflow: visible;
                animation: cardIn 0.4s ease;
                z-index: 1;
            }

            @keyframes cardIn {
                from {
                    opacity: 0;
                    transform: translateY(16px) scale(0.98);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }

            /* ---- QR FAB ---- */
            .qr-fab {
                position: absolute;
                bottom: -20px;
                right: -20px;
                width: 52px;
                height: 52px;
                border-radius: 50%;
                border: 1px solid rgba(167, 139, 250, 0.3);
                background: rgba(15, 15, 35, 0.9);
                backdrop-filter: blur(12px);
                color: var(--primary);
                cursor: pointer;
                transition: var(--transition);
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow:
                    0 4px 16px rgba(0, 0, 0, 0.3),
                    0 0 20px rgba(139, 92, 246, 0.15);
                z-index: 50;
            }
            .qr-fab:hover {
                transform: scale(1.08);
                box-shadow:
                    0 6px 24px rgba(0, 0, 0, 0.4),
                    0 0 30px rgba(139, 92, 246, 0.25);
            }
            .qr-fab:active {
                transform: scale(0.95);
            }
            .qr-fab svg {
                width: 24px;
                height: 24px;
            }

            /* ---- Header ---- */
            .view-header {
                text-align: center;
                margin-bottom: 24px;
            }
            .view-header h1 {
                font-size: 22px;
                font-weight: 700;
                margin-bottom: 4px;
                background: linear-gradient(
                    135deg,
                    #e0d4ff 0%,
                    #c4b5fd 40%,
                    #93c5fd 100%
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            .view-header p {
                color: var(--text-secondary);
                font-size: 14px;
                line-height: 1.5;
            }

            /* ---- Back Button ---- */
            .back-btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: none;
                border: none;
                color: var(--text-secondary);
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                padding: 4px 0;
                margin-bottom: 16px;
                transition: var(--transition);
                font-family: inherit;
            }
            .back-btn:hover {
                color: var(--primary);
            }
            .back-btn svg {
                width: 16px;
                height: 16px;
            }

            /* ---- Device Grid ---- */
            .device-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                margin-bottom: 12px;
            }

            .device-btn {
                width: 100%;
                border-radius: var(--radius);
                border: 1px solid rgba(255, 255, 255, 0.06);
                background: rgba(255, 255, 255, 0.04);
                transition: var(--transition);
                padding: 18px 12px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 10px;
                box-shadow: none;
                cursor: pointer;
                font-size: 13px;
                font-weight: 500;
                color: var(--text);
                font-family: inherit;
            }
            .device-btn:hover {
                border-color: var(--primary-border);
                background: rgba(167, 139, 250, 0.08);
                box-shadow: 0 0 24px rgba(139, 92, 246, 0.12);
                transform: translateY(-2px);
            }
            .device-btn:active {
                transform: translateY(0) scale(0.97);
            }

            .device-btn .icon-wrap {
                width: 44px;
                height: 44px;
                display: grid;
                place-items: center;
                border-radius: var(--radius-sm);
                border: 1px solid rgba(167, 139, 250, 0.25);
                background: rgba(167, 139, 250, 0.1);
            }
            .device-btn .icon-wrap svg {
                width: 22px;
                height: 22px;
                color: var(--primary);
            }

            .device-btn-wide {
                grid-column: 1 / -1;
                flex-direction: row;
                gap: 14px;
                padding: 16px 20px;
                font-size: 14px;
            }
            .device-btn-wide .icon-wrap svg {
                width: 24px;
                height: 24px;
            }

            /* ---- Separator ---- */
            .separator {
                margin: 20px 0;
                border: none;
                border-top: 1px solid rgba(255, 255, 255, 0.06);
            }

            /* ---- Extra Device Button ---- */
            .extra-device-btn {
                width: 100%;
                border-radius: var(--radius);
                border: 1px solid rgba(96, 165, 250, 0.2);
                background: rgba(96, 165, 250, 0.08);
                transition: var(--transition);
                padding: 14px 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 12px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
                color: #93c5fd;
                font-family: inherit;
            }
            .extra-device-btn:hover {
                background: rgba(96, 165, 250, 0.15);
            }
            .extra-device-btn svg {
                width: 20px;
                height: 20px;
                flex-shrink: 0;
            }

            /* ---- App Selector ---- */
            .app-selector {
                display: flex;
                gap: 8px;
                margin-bottom: 20px;
                overflow-x: auto;
                scrollbar-width: none;
                -webkit-overflow-scrolling: touch;
            }
            .app-selector::-webkit-scrollbar {
                display: none;
            }

            .app-chip {
                padding: 8px 16px;
                border-radius: 100px;
                border: 1px solid rgba(255, 255, 255, 0.08);
                background: rgba(255, 255, 255, 0.04);
                outline: none;
                overflow: hidden;
                -webkit-appearance: none;
                appearance: none;
                font-size: 13px;
                font-weight: 500;
                font-family: inherit;
                color: var(--text-secondary);
                cursor: pointer;
                transition: var(--transition);
                white-space: nowrap;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .app-chip:hover {
                border-color: var(--primary-border);
                color: var(--text);
            }
            .app-chip.active {
                background: linear-gradient(135deg, #7c3aed, #6366f1);
                border-color: transparent;
                color: white;

            }
            .app-chip .rec-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: #fbbf24;
                box-shadow: 0 0 6px rgba(251, 191, 36, 0.5);
            }
            .app-chip.active .rec-dot {
                background: white;
                box-shadow: none;
            }

            /* ---- Steps ---- */
            .steps {
                display: flex;
                flex-direction: column;
                gap: 0;
            }

            .step {
                display: flex;
                gap: 14px;
                padding: 0 0 20px;
                position: relative;
            }
            .step:last-child {
                padding-bottom: 0;
            }

            .step-indicator {
                display: flex;
                flex-direction: column;
                align-items: center;
                flex-shrink: 0;
            }

            .step-number {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: linear-gradient(135deg, #7c3aed, #6366f1);
                color: white;
                font-size: 13px;
                font-weight: 700;
                display: grid;
                place-items: center;
                flex-shrink: 0;
                box-shadow: 0 0 12px rgba(139, 92, 246, 0.3);
            }

            .step-line {
                width: 2px;
                flex: 1;
                background: linear-gradient(
                    to bottom,
                    rgba(167, 139, 250, 0.3),
                    rgba(167, 139, 250, 0.05)
                );
                margin-top: 8px;
                border-radius: 1px;
            }
            .step:last-child .step-line {
                display: none;
            }

            .step-content {
                flex: 1;
                padding-top: 4px;
                min-width: 0;
            }
            .step-title {
                font-size: 14px;
                font-weight: 600;
                margin-bottom: 4px;
            }
            .step-desc {
                font-size: 13px;
                color: var(--text-secondary);
                line-height: 1.5;
                margin-bottom: 10px;
            }
            .step-desc:last-child {
                margin-bottom: 0;
            }

            /* ---- Buttons ---- */
            .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 10px 18px;
                border-radius: var(--radius-sm);
                border: none;
                font-size: 13px;
                font-weight: 600;
                font-family: inherit;
                cursor: pointer;
                transition: var(--transition);
                text-decoration: none;
                white-space: nowrap;
            }
            .btn svg {
                width: 16px;
                height: 16px;
                flex-shrink: 0;
            }

            .btn-primary {
                background: linear-gradient(135deg, #7c3aed, #6366f1);
                color: white;
                box-shadow: 0 2px 12px rgba(139, 92, 246, 0.3);
            }
            .btn-primary:hover {
                box-shadow: 0 4px 20px rgba(139, 92, 246, 0.45);
                filter: brightness(1.1);
            }
            .btn-primary:active {
                transform: scale(0.97);
            }

            .btn-outline {
                background: rgba(255, 255, 255, 0.04);
                color: var(--text);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .btn-outline:hover {
                border-color: var(--primary-border);
                background: rgba(167, 139, 250, 0.1);
                color: var(--primary);
            }

            .btn-group {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            .btn-block {
                width: 100%;
            }

            /* ---- Modal ---- */
            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(5, 5, 20, 0.8);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                z-index: 1000;
                align-items: center;
                justify-content: center;
                padding: 20px;
                animation: fadeIn 0.2s ease;
            }
            .modal-overlay.active {
                display: flex;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            .modal-box {
                background: rgba(15, 15, 35, 0.95);
                backdrop-filter: blur(24px);
                border-radius: var(--radius-lg);
                max-width: 360px;
                width: 100%;
                box-shadow:
                    var(--shadow-lg),
                    0 0 40px rgba(139, 92, 246, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.08);
                animation: modalIn 0.3s ease;
                overflow: hidden;
            }

            @keyframes modalIn {
                from {
                    opacity: 0;
                    transform: scale(0.95) translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }

            .modal-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 20px 20px 0;
            }
            .modal-title {
                font-size: 17px;
                font-weight: 600;
            }
            .modal-close {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                border: none;
                background: rgba(255, 255, 255, 0.06);
                color: var(--text-secondary);
                cursor: pointer;
                display: grid;
                place-items: center;
                transition: var(--transition);
                font-size: 18px;
            }
            .modal-close:hover {
                background: rgba(255, 255, 255, 0.12);
            }
            .modal-body {
                padding: 20px;
            }

            .qr-wrap {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .qr-wrap canvas,
            .qr-wrap img {
                border-radius: var(--radius-sm);
                background: white;
                padding: 8px;
            }
            .qr-hint {
                margin-top: 12px;
                font-size: 13px;
                color: var(--text-muted);
                text-align: center;
            }

            /* ---- Toast ---- */
            .toast {
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%) translateY(80px);
                background: rgba(167, 139, 250, 0.9);
                backdrop-filter: blur(8px);
                color: white;
                padding: 10px 20px;
                border-radius: 100px;
                font-size: 13px;
                font-weight: 500;
                z-index: 2000;
                transition: transform 0.3s ease;
                pointer-events: none;
                box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
            }
            .toast.show {
                transform: translateX(-50%) translateY(0);
            }

            /* ---- View Transitions ---- */
            .view {
                animation: viewIn 0.3s ease;
            }
            @keyframes viewIn {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }

            /* ---- Info Collapsible ---- */
            .info-collapse {
                margin-bottom: 20px;
                border-radius: var(--radius-sm);
                border: 1px solid rgba(255, 255, 255, 0.06);
                background: rgba(255, 255, 255, 0.03);
                overflow: hidden;
            }
            .info-collapse-toggle {
                width: 100%;
                padding: 12px 14px;
                display: flex;
                align-items: center;
                gap: 8px;
                background: none;
                border: none;
                color: var(--text-muted);
                font-size: 13px;
                font-weight: 500;
                font-family: inherit;
                cursor: pointer;
                transition: var(--transition);
            }
            .info-collapse-toggle:hover {
                color: var(--text-secondary);
            }
            .info-collapse-toggle svg {
                width: 16px;
                height: 16px;
                flex-shrink: 0;
            }
            .info-collapse-chevron {
                margin-left: auto;
                transition: transform 0.2s ease;
            }
            .info-collapse.open .info-collapse-chevron {
                transform: rotate(180deg);
            }
            .info-collapse-body {
                display: none;
                padding: 0 14px 14px;
            }
            .info-collapse.open .info-collapse-body {
                display: block;
            }
            .info-collapse-body p {
                font-size: 13px;
                line-height: 1.6;
                color: var(--text-secondary);
                margin-bottom: 6px;
            }
            .info-collapse-body p:last-child {
                margin-bottom: 0;
            }

            /* ---- Direct Download Link ---- */
            .direct-download {
                font-size: 12px;
                color: var(--text-muted);
                margin-top: 8px;
            }
            .direct-download a {
                color: var(--primary);
                text-decoration: none;
                transition: var(--transition);
            }
            .direct-download a:hover {
                color: var(--primary-hover);
                text-decoration: underline;
            }

            /* ---- Expired Badge ---- */
            .status-badge {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 6px 12px;
                border-radius: 100px;
                font-size: 12px;
                font-weight: 600;
                margin-bottom: 16px;
            }
            .status-active {
                background: rgba(34, 197, 94, 0.15);
                color: #4ade80;
            }
            .status-expired {
                background: rgba(239, 68, 68, 0.15);
                color: #f87171;
            }

            /* ---- Responsive ---- */
            @media (max-width: 460px) {
                body {
                    padding: 12px;
                    align-items: flex-start;
                    padding-top: 24px;
                    overflow-y: auto;
                }
                .card {
                    padding: 20px;
                    border-radius: 20px;
                }
                .qr-fab {
                    bottom: -16px;
                    right: -8px;
                    width: 48px;
                    height: 48px;
                }
            }
            @media (min-width: 461px) {
                body {
                    overflow-y: auto;
                }
            }

            /* ---- Scrollbar for app selector on mobile ---- */
            @media (max-width: 360px) {
                .device-grid {
                    gap: 8px;
                }
                .device-btn {
                    padding: 14px 8px;
                    font-size: 12px;
                }
            }
        </style>
    </head>
    <body>
        <!-- Cosmic Background -->
        <canvas id="stars-canvas"></canvas>
        <div class="nebula nebula-1"></div>
        <div class="nebula nebula-2"></div>
        <div class="nebula nebula-3"></div>

        <div class="card" id="mainCard">
            <div id="app"></div>
            <button class="qr-fab" id="qrFab" title="QR-код страницы">
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <rect x="4" y="4" width="6" height="6" rx="1" />
                    <rect x="14" y="4" width="6" height="6" rx="1" />
                    <rect x="4" y="14" width="6" height="6" rx="1" />
                    <path d="M14 14h3" />
                    <path d="M20 14v.01" />
                    <path d="M14 14v3" />
                    <path d="M14 20h3" />
                    <path d="M17 17h3" />
                    <path d="M20 17v3" />
                </svg>
            </button>
        </div>

        <!-- QR Modal -->
        <div class="modal-overlay" id="qrModal">
            <div class="modal-box">
                <div class="modal-header">
                    <span class="modal-title">QR-код</span>
                    <button class="modal-close" onclick="closeModal()">
                        &times;
                    </button>
                </div>
                <div class="modal-body">
                    <div class="qr-wrap">
                        <div id="qrCode"></div>
                        <p class="qr-hint">Отсканируйте на другом устройстве</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <script>
            // ============================================================
            // DATA

            const ICONS = {

            let currentPlatform = null;
            let currentAppIndex = 0;

            // ============================================================
            // PANEL DATA
            // ============================================================
            function loadPanelData() {
                // Try Remnawave template
                try {
                    const b64 = "<%= panelData %>";
                    if (b64 && !b64.includes("<%")) {
                        panelData = JSON.parse(atob(b64));
                    }
                } catch (e) {}

                // Try data-panel attribute (like Dino page)
                if (!panelData) {
                    try {
                        const el = document.querySelector("[data-panel]");
                        if (el?.dataset.panel) {
                            panelData = JSON.parse(atob(el.dataset.panel));
                        }
                    } catch (e) {}
                }

                if (panelData?.response?.subscriptionUrl) {
                    subscriptionUrl = panelData.response.subscriptionUrl;
                }
            }

            // ============================================================
            // DEVICE DETECTION
            // ============================================================
            function detectDevice() {
                const ua = navigator.userAgent;
                const platform = navigator.platform;
                if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream)
                    return "ios";
                if (/Android/.test(ua)) {
                    // Check if it might be Android TV
                    if (/TV|BRAVIA|AFT|Chromecast/.test(ua)) return "tv";
                    return "android";
                }
                if (/Mac/.test(platform)) return "macos";
                if (/Win/.test(platform)) return "windows";
                if (/Linux/.test(platform)) return "linux";
                return null;
            }

            // ============================================================
            // RENDERING
            // ============================================================
            function render() {
                const app = document.getElementById("app");
                if (currentView === "devices") {
                    app.innerHTML = renderDeviceSelector();
                } else {
                    app.innerHTML = renderInstructions();
                }
            }

            function renderDeviceSelector() {
                const mainDevices = ["ios", "android", "windows", "macos"];
                let html = '<div class="view">';

                html += '<div class="view-header"><h1>Выберите устройство</h1>';
                html +=
                    "<p>Выберите устройство для настройки подключения</p></div>";

                html += '<div class="device-grid">';
                mainDevices.forEach((key) => {
                    const p = PLATFORMS[key];
                    html += `<button class="device-btn" onclick="selectPlatform('${key}')">
            <div class="icon-wrap">${ICONS[p.icon]}</div>
            <span>${p.name}</span>
        </button>`;
                });
                html += "</div>";

                // Linux + TV as wide buttons
                html += `<div style="display:flex;flex-direction:column;gap:12px;margin-top:12px;">`;
                ["linux", "tv"].forEach((key) => {
                    const p = PLATFORMS[key];
                    html += `<button class="device-btn device-btn-wide" onclick="selectPlatform('${key}')">
            <div class="icon-wrap">${ICONS[p.icon]}</div>
            <span>${p.name}</span>
        </button>`;
                });
                html += "</div>";

                html += "</div>";
                return html;
            }

            function renderInstructions() {
                const platform = PLATFORMS[currentPlatform];
                const app = platform.apps[currentAppIndex];
                let html = '<div class="view">';

                // Back button
                html += `<button class="back-btn" onclick="goToDevices()">${ICONS.back} Другое устройство</button>`;

                // Header
                html += `<div class="view-header" style="margin-bottom:16px;">`;
                html += `<h1>Настройка ${platform.name}</h1></div>`;

                // App selector (if >1 app)
                if (platform.apps.length > 1) {
                    html += '<div class="app-selector">';
                    platform.apps.forEach((a, i) => {
                        const active = i === currentAppIndex ? " active" : "";
                        const dot = a.recommended
                            ? '<span class="rec-dot"></span>'
                            : "";
                        html += `<span class="app-chip${active}" onclick="switchApp(${i})" role="button" tabindex="0">${dot}${esc(a.name)}</span>`;
                    });
                    html += "</div>";
                }

                // App info collapsible
                if (platform.showAppInfo) {
                    html += `<div class="info-collapse" id="appInfoCollapse">
            <button class="info-collapse-toggle" onclick="toggleInfoCollapse()">
                ${ICONS.info}
                <span>В чём разница приложений?</span>
                <span class="info-collapse-chevron">${ICONS.chevron}</span>
            </button>
            <div class="info-collapse-body">
                <p>Оба приложения — это VPN-клиенты. Они подключают вас к серверу с помощью ключа, который вы добавите на следующем шаге.</p>
                <p>Разницы почти нет — как Chrome и Firefox оба открывают сайты, так и эти приложения одинаково подключают VPN.</p>
                <p>Приложение со звёздочкой — наша рекомендация.</p>
            </div>
        </div>`;
                }

                // Steps
                html += '<div class="steps">';
                app.steps.forEach((step, i) => {
                    html += `<div class="step">`;
                    html += `<div class="step-indicator"><div class="step-number">${i + 1}</div><div class="step-line"></div></div>`;
                    html += `<div class="step-content">`;
                    html += `<div class="step-title">${esc(step.title)}</div>`;
                    html += `<div class="step-desc">${esc(step.desc)}</div>`;

                    if (step.action) {
                        html += '<div class="btn-group">';
                        if (step.action === "download") {
                            if (app.downloadLinks && app.downloadLinks.length > 0) {
                                app.downloadLinks.forEach(dl => {
                                    html += `<a href="${esc(dl.url)}" target="_blank" rel="noopener" class="btn btn-primary">${ICONS.download} ${esc(dl.label)}</a>`;
                                });
                            } else if (app.downloadUrl) {
                                html += `<a href="${esc(app.downloadUrl)}" target="_blank" rel="noopener" class="btn btn-primary">${ICONS.download} Скачать</a>`;
                            }
                        }
                        if (step.action === "import" && app.importUrl) {
                            if (subscriptionUrl) {
                                const importLink = app.importUrl.replace(
                                    "{{SUB_URL}}",
                                    subscriptionUrl,
                                );
                                html += `<a href="${esc(importLink)}" class="btn btn-primary">${ICONS.import} Подключить</a>`;
                            }
                            html += `<button class="btn btn-outline" onclick="copySubUrl()">${ICONS.copy} Скопировать ссылку</button>`;
                        }
                        if (step.action === "copy") {
                            html += `<button class="btn btn-primary" onclick="copySubUrl()">${ICONS.copy} Скопировать ссылку</button>`;
                        }
                        html += "</div>";

                        // Direct APK download link
                        if (step.action === "download" && app.directApkUrl) {
                            html += `<div class="direct-download">Нет доступа к магазину приложений? <a href="${esc(app.directApkUrl)}" target="_blank" rel="noopener">Скачать напрямую</a></div>`;
                        }
                    }

                    html += "</div></div>";
                });
                html += "</div>";

                // Extra device button
                html += '<hr class="separator">';
                html += `<button class="extra-device-btn" onclick="goToDevices()">
        ${ICONS.devices} Подключить другое устройство
    </button>`;

                html += "</div>";
                return html;
            }

            // ============================================================
            // ACTIONS
            // ============================================================
            function selectPlatform(key) {
                currentPlatform = key;
                currentAppIndex = 0;
                currentView = "instructions";
                render();
            }

            function switchApp(index) {
                currentAppIndex = index;
                render();
            }

            function goToDevices() {
                currentView = "devices";
                render();
            }

            function toggleInfoCollapse() {
                document
                    .getElementById("appInfoCollapse")
                    ?.classList.toggle("open");
            }

            function copySubUrl() {
                if (!subscriptionUrl) {
                    showToast("Ссылка подписки недоступна");
                    return;
                }
                navigator.clipboard
                    .writeText(subscriptionUrl)
                    .then(() => showToast("Ссылка скопирована!"))
                    .catch(() => showToast("Не удалось скопировать"));
            }

            function showQrModal() {
                const url = window.location.href;
                const modal = document.getElementById("qrModal");
                const container = document.getElementById("qrCode");
                container.innerHTML = "";
                try {
                    const qr = qrcode(0, "M");
                    qr.addData(url);
                    qr.make();
                    container.innerHTML = qr.createImgTag(5, 10);
                    container.querySelector("img").style.borderRadius = "12px";
                } catch (e) {
                    container.textContent = "Ошибка генерации QR";
                }
                modal.classList.add("active");
            }

            function closeModal() {
                document.getElementById("qrModal").classList.remove("active");
            }

            function showToast(msg) {
                const t = document.getElementById("toast");
                t.textContent = msg;
                t.classList.add("show");
                clearTimeout(t._timeout);
                t._timeout = setTimeout(() => t.classList.remove("show"), 2500);
            }

            function esc(str) {
                if (typeof str !== "string") return "";
                const d = document.createElement("div");
                d.textContent = str;
                return d.innerHTML;
            }

            // ============================================================
            // INIT
            // ============================================================
            document
                .getElementById("qrFab")
                .addEventListener("click", showQrModal);
            document
                .getElementById("qrModal")
                .addEventListener("click", function (e) {
                    if (e.target === this) closeModal();
                });

            loadPanelData();

            const detected = detectDevice();
            if (detected && PLATFORMS[detected]) {
                currentPlatform = detected;
                currentView = "instructions";
            } else {
                currentView = "devices";
            }

            render();

            // ============================================================
            // ANIMATED STARFIELD
            // ============================================================
            (function () {
                const canvas = document.getElementById("stars-canvas");
                const ctx = canvas.getContext("2d");
                let stars = [];
                let shootingStars = [];
                const STAR_COUNT = 200;
                const SHOOTING_INTERVAL = 4000;

                function resize() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }

                function createStars() {
                    stars = [];
                    for (let i = 0; i < STAR_COUNT; i++) {
                        stars.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            r: Math.random() * 1.5 + 0.3,
                            alpha: Math.random() * 0.8 + 0.2,
                            twinkleSpeed: Math.random() * 0.02 + 0.005,
                            twinkleOffset: Math.random() * Math.PI * 2,
                        });
                    }
                }

                function spawnShootingStar() {
                    shootingStars.push({
                        x: Math.random() * canvas.width * 0.7,
                        y: Math.random() * canvas.height * 0.4,
                        len: Math.random() * 60 + 40,
                        speed: Math.random() * 6 + 4,
                        alpha: 1,
                        angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3,
                    });
                }

                let lastTime = 0;
                function animate(time) {
                    const dt = (time - lastTime) / 16;
                    lastTime = time;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    // Stars
                    for (const s of stars) {
                        const twinkle = Math.sin(
                            time * s.twinkleSpeed + s.twinkleOffset,
                        );
                        const a = s.alpha * (0.6 + 0.4 * twinkle);
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(200,180,255,${a})`;
                        ctx.fill();
                    }

                    // Shooting stars
                    for (let i = shootingStars.length - 1; i >= 0; i--) {
                        const ss = shootingStars[i];
                        ss.x += Math.cos(ss.angle) * ss.speed * dt;
                        ss.y += Math.sin(ss.angle) * ss.speed * dt;
                        ss.alpha -= 0.008 * dt;

                        if (ss.alpha <= 0) {
                            shootingStars.splice(i, 1);
                            continue;
                        }

                        const tailX = ss.x - Math.cos(ss.angle) * ss.len;
                        const tailY = ss.y - Math.sin(ss.angle) * ss.len;
                        const grad = ctx.createLinearGradient(
                            tailX,
                            tailY,
                            ss.x,
                            ss.y,
                        );
                        grad.addColorStop(0, `rgba(167,139,250,0)`);
                        grad.addColorStop(1, `rgba(200,180,255,${ss.alpha})`);
                        ctx.beginPath();
                        ctx.moveTo(tailX, tailY);
                        ctx.lineTo(ss.x, ss.y);
                        ctx.strokeStyle = grad;
                        ctx.lineWidth = 1.5;
                        ctx.stroke();

                        // Head glow
                        ctx.beginPath();
                        ctx.arc(ss.x, ss.y, 2, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255,255,255,${ss.alpha * 0.8})`;
                        ctx.fill();
                    }

                    requestAnimationFrame(animate);
                }

                resize();
                createStars();
                window.addEventListener("resize", () => {
                    resize();
                    createStars();
                });
                setInterval(spawnShootingStar, SHOOTING_INTERVAL);
                setTimeout(spawnShootingStar, 1000);
                requestAnimationFrame(animate);
            })();
        </script>
    </body>
</html>
